name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build, tests, replay artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            g++ \
            libfftw3-dev \
            libgoogle-glog-dev \
            zlib1g-dev \
            libpng-dev

      - name: Configure Debug
        run: |
          cmake -S . -B build-debug -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build all
        run: |
          cmake --build build-debug

      - name: Run tests
        run: |
          ctest --test-dir build-debug --output-on-failure

      - name: Replay saved fuzz artifacts
        run: |
          ./build-debug/replay_artifacts 2>&1 | tee replay_artifacts.log

      - name: Upload replay log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: replay-artifacts-log
          path: replay_artifacts.log

  build-cli-release:
    name: Build CLI (Release)
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            g++ \
            libfftw3-dev \
            libgoogle-glog-dev \
            zlib1g-dev \
            libpng-dev

      - name: Configure Release
        run: |
          cmake -S . -B build-release -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build CLI
        run: |
          cmake --build build-release --target jpeg_decoder_cli